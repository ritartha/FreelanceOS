[phases.setup]
nixPkgs = [
    "python312",
    "libpq",
    "cairo",
    "pango",
    "gdk-pixbuf",
    "libffi",
    "shared-mime-info",
]

[phases.install]
cmds = [
    "pip install --upgrade pip",
    "pip install -r backend/requirements/production.txt",
]

[phases.build]
cmds = [
    "cd backend && python manage.py collectstatic --noinput",
]

[start]
cmd = "cd backend && python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"

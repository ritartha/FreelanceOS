<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | FreelanceOS</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="global-alert" class="alert" style="position:fixed; top:20px; right:20px; z-index:9999; max-width:400px;"></div>

  <div class="dashboard-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>FreelanceOS</h2>
      </div>
      
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-view="dashboard">
          <i>⊞</i> Dashboard
        </a>
        <a href="#" class="nav-item" data-view="clients">
          <i>👥</i> CRM / Clients
        </a>
        <a href="#" class="nav-item" data-view="projects">
          <i>💼</i> Projects
        </a>
        <a href="#" class="nav-item" data-view="tasks">
          <i>✅</i> Tasks
        </a>
        <a href="#" class="nav-item" data-view="invoices">
          <i>🧾</i> Invoices
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile-sm">
          <div class="avatar" id="user-avatar">U</div>
          <div class="user-details">
            <div class="user-name" id="user-name">User Name</div>
            <div class="user-email" id="user-email">user@example.com</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="topbar">
        <h3 id="current-view-title">Dashboard Overview</h3>
        <button class="btn btn-ghost" id="btn-logout">Logout</button>
      </header>

      <div class="content-area">
        
        <!-- View: Dashboard Summary -->
        <div id="view-dashboard" class="view-section">
          <div class="stats-grid">
            <div class="stat-card glass-panel glass-panel-hover">
              <div class="stat-label">Active Projects</div>
              <div class="stat-value" id="stat-projects">-</div>
            </div>
            <div class="stat-card glass-panel glass-panel-hover">
              <div class="stat-label">Pending Tasks</div>
              <div class="stat-value" id="stat-tasks">-</div>
            </div>
            <div class="stat-card glass-panel glass-panel-hover">
              <div class="stat-label">Unpaid Invoices</div>
              <div class="stat-value" id="stat-invoices">-</div>
            </div>
            <div class="stat-card glass-panel glass-panel-hover">
              <div class="stat-label">Total Expenses</div>
              <div class="stat-value" id="stat-expenses">-</div>
            </div>
          </div>
        </div>

        <!-- View: Data Table Stub -->
        <div id="view-list" class="view-section hidden">
          <div class="glass-panel" style="padding: 20px;">
            <div class="flex-between mb-4">
              <h4>Records</h4>
              <button class="btn btn-primary" id="btn-create-new">+ Create New</button>
            </div>
            <div class="table-container">
              <table class="table" id="data-table">
                <thead>
                  <tr id="table-head">
                    <!-- Dynamic Headers -->
                  </tr>
                </thead>
                <tbody id="table-body">
                  <!-- Dynamic Rows -->
                </tbody>
              </table>
              <div id="empty-state" class="text-center mt-4 hidden">
                <p>No records found.</p>
              </div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Protect Route
      if (!api.isAuthenticated()) {
        window.location.href = 'index.html';
        return;
      }

      // Initialize User Profile in Sidebar
      if (api.user) {
        document.getElementById('user-name').textContent = `${api.user.first_name} ${api.user.last_name}`;
        document.getElementById('user-email').textContent = api.user.email;
        document.getElementById('user-avatar').textContent = api.user.first_name ? api.user.first_name[0].toUpperCase() : 'U';
      }

      // Logout handler
      document.getElementById('btn-logout').addEventListener('click', async () => {
        const btn = document.getElementById('btn-logout');
        showSpinner(btn);
        await api.logout();
        window.location.href = 'index.html';
      });

      // Navigation Logic
      const navItems = document.querySelectorAll('.nav-item');
      const viewDashboard = document.getElementById('view-dashboard');
      const viewList = document.getElementById('view-list');
      const titleEl = document.getElementById('current-view-title');

      navItems.forEach(item => {
        item.addEventListener('click', (e) => {
          e.preventDefault();
          navItems.forEach(nav => nav.classList.remove('active'));
          item.classList.add('active');
          
          const viewName = item.getAttribute('data-view');
          titleEl.textContent = item.textContent.trim().replace(/^[^\s]+\s/, ''); // strip emoji

          if (viewName === 'dashboard') {
            viewDashboard.classList.remove('hidden');
            viewList.classList.add('hidden');
            loadDashboardStats();
          } else {
            viewDashboard.classList.add('hidden');
            viewList.classList.remove('hidden');
            loadListData(viewName);
          }
        });
      });

      // Load initial dashboard stats
      async function loadDashboardStats() {
        try {
          const data = await api.getDashboardSummary();
          // Assuming backend returns { projects: 5, tasks: 12, invoices: 3, expenses: 8 }
          // Right now backend returns all 0s from the stub, let's display them
          if(data) {
            document.getElementById('stat-projects').textContent = data.projects || 0;
            document.getElementById('stat-tasks').textContent = data.tasks || 0;
            document.getElementById('stat-invoices').textContent = data.invoices || 0;
            document.getElementById('stat-expenses').textContent = data.expenses || 0;
          }
        } catch (error) {
          showAlert('Failed to load dashboard statistics.', 'error');
        }
      }

      // Generic function to load lists (Clients, Projects, etc)
      async function loadListData(type) {
        const tHead = document.getElementById('table-head');
        const tBody = document.getElementById('table-body');
        const emptyState = document.getElementById('empty-state');
        
        tHead.innerHTML = '';
        tBody.innerHTML = '<tr><td colspan="4" class="text-center"><span class="spinner"></span> Loading...</td></tr>';
        emptyState.classList.add('hidden');

        let endpoint = '';
        let columns = [];

        switch(type) {
          case 'clients':
            endpoint = '/clients/';
            columns = ['Name', 'Email', 'Company', 'Status'];
            break;
          case 'projects':
            endpoint = '/projects/';
            columns = ['Name', 'Status', 'Start Date', 'Budget'];
            break;
          case 'tasks':
            endpoint = '/tasks/';
            columns = ['Title', 'Priority', 'Status', 'Due Date'];
            break;
          case 'invoices':
            endpoint = '/invoices/';
            columns = ['Invoice #', 'Status', 'Issue Date', 'Total'];
            break;
        }

        if (!endpoint) return;

        // Render headers
        columns.forEach(col => {
          const th = document.createElement('th');
          th.textContent = col;
          tHead.appendChild(th);
        });

        try {
          // Backend list endpoints usually return an array or a paginated object { results: [...] }
          const res = await api.fetch(endpoint);
          let records = Array.isArray(res) ? res : (res.results || []);

          tBody.innerHTML = '';

          if (records.length === 0) {
            emptyState.classList.remove('hidden');
            return;
          }

          records.forEach(record => {
            const tr = document.createElement('tr');
            
            // Very naive mapping just for demonstration based on type
            let rowData = [];
            if(type === 'clients') rowData = [record.name, record.email, record.company, renderBadge(record.status)];
            if(type === 'projects') rowData = [record.name, renderBadge(record.status), record.start_date, `$${record.budget}`];
            if(type === 'tasks') rowData = [record.title, renderBadge(record.priority), renderBadge(record.status), record.due_date];
            if(type === 'invoices') rowData = [record.invoice_number, renderBadge(record.status), record.issue_date, `$${record.total}`];

            rowData.forEach(cellHtml => {
              const td = document.createElement('td');
              td.innerHTML = cellHtml || '-';
              tr.appendChild(td);
            });
            tBody.appendChild(tr);
          });
        } catch (error) {
          tBody.innerHTML = `<tr><td colspan="${columns.length}" class="text-center text-danger">Failed to load data.</td></tr>`;
        }
      }

      function renderBadge(status) {
        if(!status) return '-';
        const colorClass = ['active', 'paid', 'done'].includes(status) ? 'badge-success' : 'badge-warning';
        return `<span class="badge ${colorClass}">${status.replace('_', ' ').toUpperCase()}</span>`;
      }

      // Initial Load
      loadDashboardStats();
    });
  </script>
</body>
</html>

version: "3.8"

# Use `docker compose --profile services up -d` for local Python development
# with only PostgreSQL and Redis, or `docker compose --profile docker up`
# for the full containerized application stack.

services:
  # ==========================================================================
  # PostgreSQL Database
  # ==========================================================================
  postgres:
    image: postgres:16-alpine
    profiles: ["services", "docker"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: freelanceos
      POSTGRES_USER: freelanceos
      POSTGRES_PASSWORD: freelanceos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelanceos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Redis (Cache, Sessions, Celery Broker)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    profiles: ["services", "docker"]
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Django Web Application
  # ==========================================================================
  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    profiles: ["docker"]
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgres://freelanceos:freelanceos@postgres:5432/freelanceos
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==========================================================================
  # Nginx Reverse Proxy
  # ==========================================================================
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    profiles: ["docker"]
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/app:ro
    depends_on:
      - web

  # ==========================================================================
  # Celery Worker
  # ==========================================================================
  celery_worker:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    profiles: ["docker"]
    command: celery -A config worker -l info --concurrency=2 -Q default,emails,notifications,pdf_generation,billing,reports
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgres://freelanceos:freelanceos@postgres:5432/freelanceos
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ==========================================================================
  # Celery Beat Scheduler
  # ==========================================================================
  celery_beat:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    profiles: ["docker"]
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.local
      - DATABASE_URL=postgres://freelanceos:freelanceos@postgres:5432/freelanceos
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
